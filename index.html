<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture Notes - Download Center</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Lecture Notes</h1>
            <p class="subtitle">Your study materials, organized and ready to download</p>
        </header>

        <div id="units-grid" class="units-grid">
            <!-- Units will be dynamically generated here -->
        </div>

        <div id="pdfs-view" class="pdfs-view hidden">
            <button id="back-btn" class="back-btn">← Back to Units</button>
            <h2 id="unit-title" class="unit-title"></h2>
            <div id="pdfs-list" class="pdfs-list">
                <!-- PDFs will be dynamically generated here -->
            </div>
        </div>

        <footer class="whatsapp-footer">
            <p>Have revision materials or something you feel was left out to share?</p>
            <p>Send them via WhatsApp so we can add them to the respective units or update the existing ones!</p>
            <a href="https://wa.me/254112576616?text=Hi!%20I%20have%20revision%20materials%20to%20share." target="_blank" class="whatsapp-link">
                📱 WhatsApp: 0112576616
            </a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
